# Ollama Models (Local)
ollama_models:
  - name: "gemma2:27b"
    type: "ollama"
    temperature: 0.7
    
  - name: "qwen2.5:32b"
    type: "ollama"
    temperature: 0.7
    
  - name: "llama3.1:70b"
    type: "ollama"
    temperature: 0.7

# Online Models (API-based)
online_models:
  - name: "gpt-4-turbo"
    type: "openai"
    temperature: 0.7
    
  - name: "claude-3-sonnet"
    type: "anthropic"
    temperature: 0.7
    
  - name: "gemini-pro"
    type: "google"
    temperature: 0.7

# Embedding Models
embeddings:
  default: "sentence-transformers/all-MiniLM-L6-v2"
  alternatives:
    - "sentence-transformers/all-mpnet-base-v2"
    - "BAAI/bge-base-en-v1.5"